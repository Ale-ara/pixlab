<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Larissa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    font-size:16px;
    -webkit-text-size-adjust:100%;
    scroll-behavior:smooth;
}

body{

    overflow:hidden;

    height:100vh;

    font-family:'Poppins', sans-serif;

    background:black;

    position:relative;

    color:white;

}

/* =====================================================
   FUNDO
===================================================== */

.background{

    position:absolute;

    width:100%;
    height:100%;

    background:
    radial-gradient(circle at top left,
    #ff0080 0%,
    transparent 30%),

    radial-gradient(circle at bottom right,
    #7a00ff 0%,
    transparent 35%),

    radial-gradient(circle at center,
    #ff4d6d22 0%,
    transparent 50%),

    #050505;

    animation:bgMove 15s infinite alternate ease-in-out;

}

@keyframes bgMove{

    from{
        transform:scale(1) rotate(0deg);
    }

    to{
        transform:scale(1.15) rotate(2deg);
    }

}

/* =====================================================
   ESTRELAS
===================================================== */

.star{

    position:absolute;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    animation:blink 2s infinite alternate;

}

@keyframes blink{

    from{
        opacity:.2;
    }

    to{
        opacity:1;
    }

}

/* =====================================================
   CONTAINER
===================================================== */

.container{

    position:relative;

    z-index:5;

    width:100%;
    height:100%;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:flex-start;

    text-align:center;

    padding-top:80px;

}

/* =====================================================
   TITULO
===================================================== */

.title{

    font-family:'Great Vibes', cursive;

    font-size:7rem;

    line-height:1;

    text-shadow:
    0 0 10px #ff4d88,
    0 0 30px #ff4d88,
    0 0 60px #ff4d88;

    animation:pulse 4s infinite ease-in-out;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.05);
    }

    100%{
        transform:scale(1);
    }

}

.sub{

    margin-top:12px;

    font-size:1.2rem;

    opacity:.92;

    letter-spacing:1px;

}

/* =====================================================
   TEXTO ANIMADO
===================================================== */

.typing{

    margin-top:30px;

    font-size:1.2rem;

    font-weight:300;

    min-height:55px;

    color:#ffd2df;

    padding:0 20px;

    line-height:1.5;

}

/* =====================================================
   CARD
===================================================== */

.message-box{

    position:absolute;

    bottom:25px;

    width:min(88%,650px);

    padding:16px 18px;

    border-radius:28px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.14),
        rgba(255,255,255,.05)
    );

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.12);

    box-shadow:
    0 10px 40px rgba(255,0,100,.18),
    inset 0 1px 0 rgba(255,255,255,.08);

    animation:float 4s infinite ease-in-out;

}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0);
    }

}

.message-box p{

    font-size:.88rem;

    line-height:1.7;

    color:#f5f5f5;

}

/* =====================================================
   CORAÇÕES
===================================================== */

.heart{

    position:absolute;

    bottom:-50px;

    color:#ff4d88;

    animation:rise linear forwards;

    pointer-events:none;

    opacity:.85;

}

@keyframes rise{

    0%{
        transform:translateY(0) scale(0);
        opacity:0;
    }

    15%{
        opacity:1;
    }

    100%{
        transform:
        translateY(-120vh)
        scale(1.5)
        rotate(360deg);

        opacity:0;
    }

}

/* =====================================================
   TABLET
===================================================== */

@media(max-width:768px){

    .title{
        font-size:5rem;
    }

}

/* =====================================================
   iPHONE / CELULAR
===================================================== */

@media screen and (max-width:440px){

    .container{

        padding-top:70px;

        padding-left:15px;
        padding-right:15px;

    }

    .title{

        font-size:4rem;

        line-height:.95;

    }

    .sub{

        font-size:1rem;

        margin-top:18px;

        line-height:1.5;

    }

    .typing{

        font-size:.95rem;

        margin-top:25px;

        min-height:55px;

    }

    .message-box{

        width:88%;

        bottom:22px;

        padding:16px 18px;

    }

    .message-box p{

        font-size:.88rem;

        line-height:1.7;

    }

}

/* =====================================================
   CELULARES MENORES
===================================================== */

@media screen and (max-width:375px){

    .title{
        font-size:3.4rem;
    }

    .typing{
        font-size:.88rem;
    }

    .message-box p{
        font-size:.8rem;
    }

}

/* =====================================================
   NOTCH / DYNAMIC ISLAND
===================================================== */

@supports (padding:max(0px)){

    body{

        padding-top:
        max(12px, env(safe-area-inset-top));

        padding-bottom:
        max(12px, env(safe-area-inset-bottom));

        padding-left:
        max(12px, env(safe-area-inset-left));

        padding-right:
        max(12px, env(safe-area-inset-right));

    }

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="title">
        Eu te amo<br>
        Larissa ❤️
    </div>

    <div class="sub">
        Você é meu lugar favorito no mundo.
    </div>

    <div class="typing" id="typing"></div>

</div>

<div class="message-box">

    <p>
        Desde que você apareceu na minha vida,
        tudo ficou mais bonito.
        Seu sorriso acalma meus pensamentos,
        sua presença melhora meus dias
        e cada momento com você vira
        uma lembrança especial.
        <br><br>
        Você é a melhor parte da minha história. ❤️
    </p>

</div>

<script>

/* =====================================================
   TEXTO ANIMADO
===================================================== */

const frases = [

    "Você é a mulher mais incrível desse mundo ✨",

    "Meu coração é completamente seu ❤️",

    "Cada segundo com você vale a pena 🌙",

    "Eu escolheria você em todas as vidas 💖",

    "Você é meu melhor sentimento 🥰"

];

let fraseAtual = 0;

let letra = 0;

const typing =
document.getElementById("typing");

function escrever(){

    if(letra < frases[fraseAtual].length){

        typing.innerHTML +=
        frases[fraseAtual].charAt(letra);

        letra++;

        setTimeout(escrever, 60);

    }else{

        setTimeout(apagar, 2200);

    }

}

function apagar(){

    if(letra > 0){

        typing.innerHTML =
        frases[fraseAtual]
        .substring(0, letra - 1);

        letra--;

        setTimeout(apagar, 30);

    }else{

        fraseAtual++;

        if(fraseAtual >= frases.length){

            fraseAtual = 0;

        }

        setTimeout(escrever, 400);

    }

}

escrever();

/* =====================================================
   CORAÇÕES
===================================================== */

function criarCoracao(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random() * window.innerWidth + "px";

    heart.style.fontSize =
    (Math.random() * 28 + 14) + "px";

    heart.style.animationDuration =
    (Math.random() * 4 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    }, 8000);

}

setInterval(criarCoracao, 250);

/* =====================================================
   ESTRELAS
===================================================== */

for(let i = 0; i < 120; i++){

    const star =
    document.createElement("div");

    star.classList.add("star");

    star.style.left =
    Math.random() * 100 + "%";

    star.style.top =
    Math.random() * 100 + "%";

    star.style.animationDuration =
    (Math.random() * 3 + 1) + "s";

    document.body.appendChild(star);

}

</script>

</body>
</html>
