<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8" />

<meta name="viewport"
content="width=device-width, initial-scale=1.0"/>

<title>Eu te amo Larissa ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{

    width:100%;
    min-height:100%;

    overflow-x:hidden;

    font-family:'Poppins', sans-serif;

    background:black;

    color:white;

}

body{

    position:relative;

    display:flex;

    justify-content:center;

    background:#000;

}

/* =====================================================
   FUNDO
===================================================== */

.background{

    position:fixed;

    inset:0;

    width:100%;
    height:100%;

    background:
    radial-gradient(circle at top left,
    #ff0080 0%,
    transparent 30%),

    radial-gradient(circle at bottom right,
    #7a00ff 0%,
    transparent 35%),

    radial-gradient(circle at center,
    #ff4d6d22 0%,
    transparent 50%),

    #050505;

    animation:bgMove 15s infinite alternate ease-in-out;

    z-index:0;

}

@keyframes bgMove{

    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }

}

/* =====================================================
   ESTRELAS
===================================================== */

.star{

    position:fixed;

    width:2px;
    height:2px;

    background:white;

    border-radius:50%;

    animation:blink 2s infinite alternate;

    z-index:1;

}

@keyframes blink{

    from{
        opacity:.2;
    }

    to{
        opacity:1;
    }

}

/* =====================================================
   CONTAINER
===================================================== */

.container{

    position:relative;

    z-index:5;

    width:100%;

    max-width:700px;

    display:flex;

    flex-direction:column;

    align-items:center;

    text-align:center;

    padding:

    80px
    20px
    60px;

}

/* =====================================================
   TITULO
===================================================== */

.title{

    font-family:'Great Vibes', cursive;

    font-size:6rem;

    line-height:.95;

    text-shadow:
    0 0 10px #ff4d88,
    0 0 30px #ff4d88,
    0 0 60px #ff4d88;

    animation:pulse 4s infinite ease-in-out;

}

@keyframes pulse{

    0%{
        transform:scale(1);
    }

    50%{
        transform:scale(1.03);
    }

    100%{
        transform:scale(1);
    }

}

.sub{

    margin-top:18px;

    font-size:1.2rem;

    line-height:1.5;

    opacity:.95;

}

/* =====================================================
   TEXTO ANIMADO
===================================================== */

.typing{

    margin-top:35px;

    min-height:70px;

    font-size:1.2rem;

    color:#ffd7e6;

    line-height:1.6;

    padding:0 10px;

}

/* =====================================================
   CARD
===================================================== */

.message-box{

    width:100%;

    margin-top:40px;

    padding:22px;

    border-radius:30px;

    background:
    linear-gradient(
        180deg,
        rgba(255,255,255,.12),
        rgba(255,255,255,.05)
    );

    border:1px solid rgba(255,255,255,.12);

    backdrop-filter:blur(16px);

    box-shadow:
    0 10px 40px rgba(255,0,120,.18);

    animation:float 4s infinite ease-in-out;

}

@keyframes float{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-8px);
    }

    100%{
        transform:translateY(0);
    }

}

.message-box p{

    font-size:1rem;

    line-height:1.9;

    color:#f5f5f5;

}

/* =====================================================
   CORAÇÕES
===================================================== */

.heart{

    position:fixed;

    bottom:-50px;

    color:#ff4d88;

    pointer-events:none;

    animation:rise linear forwards;

    z-index:2;

}

@keyframes rise{

    0%{
        transform:
        translateY(0)
        scale(0);

        opacity:0;
    }

    15%{
        opacity:1;
    }

    100%{

        transform:
        translateY(-120vh)
        scale(1.5)
        rotate(360deg);

        opacity:0;

    }

}

/* =====================================================
   CELULAR
===================================================== */

@media screen and (max-width:440px){

    .container{

        padding-top:60px;

        padding-left:18px;

        padding-right:18px;

    }

    .title{

        font-size:4.2rem;

    }

    .sub{

        font-size:1rem;

    }

    .typing{

        font-size:1rem;

        min-height:60px;

        margin-top:25px;

    }

    .message-box{

        margin-top:25px;

        padding:20px;

        border-radius:26px;

    }

    .message-box p{

        font-size:.95rem;

        line-height:1.8;

    }

}

/* =====================================================
   CELULARES PEQUENOS
===================================================== */

@media screen and (max-width:375px){

    .title{

        font-size:3.5rem;

    }

    .typing{

        font-size:.92rem;

    }

    .message-box p{

        font-size:.85rem;

    }

}

/* =====================================================
   NOTCH / DYNAMIC ISLAND
===================================================== */

@supports (padding:max(0px)){

    body{

        padding-top:
        max(12px, env(safe-area-inset-top));

        padding-bottom:
        max(12px, env(safe-area-inset-bottom));

    }

}

</style>

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="title">
        Eu te amo<br>
        Larissa ❤️
    </div>

    <div class="sub">
        Você é meu lugar favorito no mundo.
    </div>

    <div class="typing" id="typing"></div>

    <div class="message-box">

        <p>
            Desde que você apareceu na minha vida,
            tudo ficou mais bonito.
            Seu sorriso acalma meus pensamentos,
            sua presença melhora meus dias
            e cada momento com você vira
            uma lembrança especial.
            <br><br>
            Você é a melhor parte da minha história. ❤️
        </p>

    </div>

</div>

<script>

/* =====================================================
   TEXTO ANIMADO
===================================================== */

const frases = [

    "Você é a mulher mais incrível desse mundo ✨",

    "Meu coração é completamente seu ❤️",

    "Cada segundo com você vale a pena 🌙",

    "Eu escolheria você em todas as vidas 💖",

    "Você é meu melhor sentimento 🥰"

];

let fraseAtual = 0;

let letra = 0;

const typing =
document.getElementById("typing");

function escrever(){

    if(letra < frases[fraseAtual].length){

        typing.innerHTML +=
        frases[fraseAtual].charAt(letra);

        letra++;

        setTimeout(escrever, 60);

    }

    else{

        setTimeout(apagar, 2200);

    }

}

function apagar(){

    if(letra > 0){

        typing.innerHTML =
        frases[fraseAtual]
        .substring(0, letra - 1);

        letra--;

        setTimeout(apagar, 30);

    }

    else{

        fraseAtual++;

        if(fraseAtual >= frases.length){

            fraseAtual = 0;

        }

        setTimeout(escrever, 400);

    }

}

escrever();

/* =====================================================
   CORAÇÕES
===================================================== */

function criarCoracao(){

    const heart =
    document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "❤";

    heart.style.left =
    Math.random() * window.innerWidth + "px";

    heart.style.fontSize =
    (Math.random() * 24 + 12) + "px";

    heart.style.animationDuration =
    (Math.random() * 4 + 4) + "s";

    document.body.appendChild(heart);

    setTimeout(() => {

        heart.remove();

    }, 8000);

}

setInterval(criarCoracao, 300);

/* =====================================================
   ESTRELAS
===================================================== */

for(let i = 0; i < 120; i++){

    const star =
    document.createElement("div");

    star.classList.add("star");

    star.style.left =
    Math.random() * 100 + "%";

    star.style.top =
    Math.random() * 100 + "%";

    star.style.animationDuration =
    (Math.random() * 3 + 1) + "s";

    document.body.appendChild(star);

}

</script>

</body>
</html>
